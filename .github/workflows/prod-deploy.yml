name: "Prod Infrastructure Deploy"
on:
  push:
    branches: [main]
    paths: ["environments/prod/**", "modules/**", ".github/workflows/prod-deploy.yml"]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  terraform-plan:
    name: "Terraform Plan Prod"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_PROD_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.AWS_PROD_LOCKS_TABLE }}"
      - run: terraform plan
  terraform-apply:
    name: "Terraform Apply Prod"
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./environments/prod
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_PROD_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.AWS_PROD_LOCKS_TABLE }}"
      - run: terraform apply -auto-approve
